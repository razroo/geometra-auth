name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Build @geometra/auth dist
        run: |
          npm install --ignore-scripts @geometra/server@latest @geometra/client@latest typescript @types/node
          npx tsc -p tsconfig.build.json

      - name: Install example dependencies
        run: cd examples/basic && npm install

      - name: Build client
        run: cd examples/basic && npx vite build --config vite.config.ts

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: examples/basic/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
